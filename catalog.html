<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Каталог · Мелодия природы</title>
    <meta
      name="description"
      content="Кремы, бальзамы, тоники, гидролаты и очищающие средства бренда «Мелодия природы» с карточками, составами и сценариями применения."
    >
    <link rel="icon" href="assets/images/cream-flora-photo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="catalog">
    <header class="site-header" data-shell="header"></header>

    <main>
      <section class="page-hero">
        <div class="container page-hero__grid">
          <div class="page-hero__copy">
            <div>
              <div class="eyebrow">Каталог</div>
              <h1 id="catalog-headline">Каталог ухода</h1>
            </div>
            <p class="page-hero__lead" id="catalog-copy">
              Здесь собраны кремы, бальзамы, тоники, гидролаты и очищающие средства с подробным
              описанием состава, применения и сценариев, под которые они создавались.
            </p>
            <div class="button-row">
              <a class="button" href="product.html?id=flora-direct">Открыть популярную карточку</a>
              <a class="button button_secondary" href="series.html">Смотреть подбор по коже</a>
            </div>
          </div>
          <div class="page-hero__visual">
            <div class="page-hero__frame">
              <img src="assets/images/brand-shot.png" alt="Каталог ритуалов ухода">
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div class="filter-bar" id="catalog-filters"></div>
          <div class="series-stack" id="catalog-list"></div>
        </div>
      </section>
    </main>

    <footer class="footer" data-shell="footer"></footer>
    <script type="module" src="main.js"></script>
  </body>
</html>
